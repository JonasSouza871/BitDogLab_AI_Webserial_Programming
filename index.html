<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitDogLab AI WebSerial</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="lib/xterm/xterm.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <img src="images/icon-bitdoglab-nobg.png" alt="BitDogLab" class="header-icon">
                <span class="logo">BitDogLab</span>
                <span class="badge">AI</span>
            </div>
            <div class="header-controls">
                <button id="connectBtn" class="btn btn-connect">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Conectar</span>
                </button>
                <button id="disconnectBtn" class="btn btn-disconnect" disabled>
                    <span class="btn-text">Desconectar</span>
                </button>
                <button id="configBtn" class="btn btn-config" title="Configurar IA">
                    <span class="btn-icon">&#9881;</span>
                </button>
                <div class="status-indicator">
                    <span id="statusDot" class="status-dot disconnected"></span>
                    <span id="statusText" class="status-text">Desconectado</span>
                </div>
            </div>
        </header>

        <!-- Mobile Tabs -->
        <div class="mobile-tabs">
            <button class="tab-btn active" data-tab="chat">
                <span class="tab-icon">@</span>
                <span>Chat</span>
            </button>
            <button class="tab-btn" data-tab="terminal">
                <span class="tab-icon">$</span>
                <span>Terminal</span>
            </button>
        </div>

        <!-- Main Content -->
        <main class="main">
            <!-- Chat Section -->
            <section class="chat-section active" id="chatSection">
                <div class="chat-container">
                    <div class="messages" id="messages" style="position: relative;">
                        <!-- Mensagem inicial do sistema -->
                        <div class="message system">
                            <div class="message-bubble">
                                <p>Olá! Sou seu assistente BitDogLab.</p>
                                <p>Conecte sua placa no USB e me peça para criar programas!</p>
                            </div>
                            <span class="message-time">agora</span>
                        </div>
                    </div>
                    
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <input 
                                type="text" 
                                id="chatInput" 
                                class="chat-input" 
                                placeholder="Digite sua mensagem..."
                                autocomplete="off"
                            >
                            <button id="chatSendBtn" class="btn-send-message">
                                <span class="send-icon">></span>
                            </button>
                        </div>
                        <div class="chat-hint">Pressione Enter para enviar</div>
                    </div>
                </div>
            </section>

            <!-- Terminal Section -->
            <section class="terminal-section" id="terminalSection">
                <div class="terminal-container">
                    <div class="terminal-toolbar">
                        <span class="terminal-title">Terminal Serial</span>
                        <div class="terminal-controls">
                            <select id="baudRate" class="select select-small">
                                <option value="9600">9600</option>
                                <option value="19200">19200</option>
                                <option value="38400">38400</option>
                                <option value="57600">57600</option>
                                <option value="115200" selected>115200</option>
                            </select>
                            <button id="clearBtn" class="btn btn-small">Limpar</button>
                        </div>
                    </div>
                    <div id="terminal" class="terminal"></div>
                    <div class="terminal-input-area">
                        <input 
                            type="text" 
                            id="commandInput" 
                            class="terminal-input" 
                            placeholder="Digite um comando..." 
                            disabled
                        >
                        <button id="sendBtn" class="btn btn-send" disabled>Enviar</button>
                        <button id="ctrlCBtn" class="btn btn-ctrl" disabled>Ctrl+C</button>
                        <button id="ctrlDBtn" class="btn btn-ctrl" disabled>Ctrl+D</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal de Configuracao da IA -->
    <div id="configModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 class="modal-title">Configurar IA</h2>
            <div class="modal-body">
                <label class="form-label">Provedor</label>
                <select id="providerSelect" class="select form-select">
                    <option value="">-- Selecione --</option>
                    <option value="kimi">Kimi (Moonshot)</option>
                    <option value="glm">GLM (Zhipu)</option>
                    <option value="qwen">Qwen (Alibaba)</option>
                    <option value="minimax">Minimax</option>
                    <option value="openai">OpenAI</option>
                    <option value="custom">Personalizado</option>
                </select>

                <label class="form-label">URL Base da API</label>
                <input type="text" id="configBaseUrl" class="form-input" placeholder="https://api.exemplo.com/v1">

                <label class="form-label">Modelo</label>
                <select id="configModel" class="select form-select">
                </select>
                <input type="text" id="configModelCustom" class="form-input hidden" placeholder="nome-do-modelo">

                <label class="form-label">API Key</label>
                <input type="password" id="configApiKey" class="form-input" placeholder="Sua chave de API">
            </div>
            <div class="modal-footer">
                <button id="configSaveBtn" class="btn btn-save">Salvar</button>
                <button id="configCancelBtn" class="btn btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="lib/xterm/xterm.js"></script>
    <script src="js/webserial.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
